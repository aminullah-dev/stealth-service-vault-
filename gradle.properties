# Gradle daemon JVM heap — raised from the 512 MiB default so the dex merge
# step does not OOM when SQLCipher's native libs are included.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Parallel execution and configuration cache speed up subsequent builds.
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin code-style (no effect on compilation, suppresses IDE hints).
kotlin.code.style=official

# Disable Jetifier — we have no legacy Support Library dependencies.
android.useAndroidX=true
android.enableJetifier=false
